<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DofusCraft Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>DofusCraft Planner</h1>
      <p>Calculadora de crafting, compra e farm (dark mode).</p>
    </header>

    <main class="layout">
      <section class="card controls">
        <label for="itemSelect">Item alvo</label>
        <select id="itemSelect"></select>

        <label for="quantityInput">Quantidade desejada</label>
        <input id="quantityInput" type="number" min="1" value="1" />

        <button id="calculateBtn">Calcular</button>
      </section>

      <section class="card summary" id="summary"></section>

      <section class="card">
        <h2>Árvore de receitas</h2>
        <div id="recipeTree" class="tree"></div>
      </section>

      <section class="card">
        <h2>Monstros que dropam os recursos</h2>
        <div id="dropsPanel" class="drops-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
